name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ghedday
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ghedday"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=ghedday;Username=postgres;Password=postgres"
      GHEDDAY_TEST_CONNECTION: "Host=localhost;Port=5432;Database=ghedday;Username=postgres;Password=postgres"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --no-restore --configuration Release

      - name: Apply migrations
        working-directory: backend
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update \
            --project src/GhedDay.Infrastructure \
            --startup-project src/GhedDay.Api

      - name: Test
        working-directory: backend
        run: dotnet test --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5126
          NEXT_PUBLIC_SIGNALR_URL: http://localhost:5126/hubs/booking
