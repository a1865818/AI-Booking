services:
  postgres:
    image: postgres:16
    container_name: ghedday-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ghedday
    ports:
      - "5432:5432"
    volumes:
      - ghedday-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ghedday"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ghedday-pgdata:
